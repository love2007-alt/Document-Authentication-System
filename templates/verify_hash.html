<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Verify Hash</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="glass-card">

        <h1>

            SHA-256 Hash Verification

        </h1>

        <br>

        <form action="/verify-hash"
              method="POST">

            <textarea
                name="hash"
                rows="5"
                cols="50"
                placeholder="Paste SHA-256 Hash Here..."
                required>
            </textarea>

            <br><br>

            <button type="submit">

                Verify Hash

            </button>

        </form>

        <br>

        {% if result %}

        <div class="hash-value">

            {{ result }}

        </div>

        {% endif %}

        <br><br>

        <a href="/">

            <button>

                Back To Homepage

            </button>

        </a>

    </div>

</div>

</body>
</html>
