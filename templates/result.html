<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload Success</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

    <div class="container">

        <div class="glass-card">

            <h1 class="success-text">
                Document Uploaded Successfully

            <br>

            <h2>

    AI Security Analysis:

    {{ risk_level }}

</h2>

                {{ file_hash }}

            <br><br>

            <br>

                filename='qrcodes/' + qr_file) }}"
                width="250"
            >

            <br><br>

            <a href="/download-report/{{ report_file }}">

    <button>
        Download Verification Report
    </button>

</a>

<br><br>
            <a href="{{ url_for('static',
filename='qrcodes/' + qr_file) }}"
download>

    <button>

        Download QR Code

    </button>

</a>

<br><br>
            <a href="/">
                <button>
                    Back To Homepage
                </button>
            </a>

        </div>

    </div>

</body>
</html>
